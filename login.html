<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Reuso | Marketplace de Reaproveitamento</title>
  <meta name="description" content="Faça login no Reuso e dê um novo destino para o que você não usa mais. Marketplace de reaproveitamento consciente.">
  <meta name="keywords" content="reuso, login, marketplace, reaproveitamento, sustentabilidade">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <div id="navbar-container"></div>

  <!-- Main Content -->
  <main class="auth-container">
    <div class="auth-card animate-fade-in-up">

      <!-- Logo -->
      <div class="auth-logo">
        <i class="bi bi-recycle"></i>
      </div>

      <!-- Title -->
      <h1 class="auth-title">Entrar no Reuso</h1>
      <p class="auth-subtitle">Acesse sua conta e continue reaproveitando</p>

      <!-- Alert Area -->
      <div id="alert-area"></div>

      <!-- Login Form -->
      <form id="login-form" novalidate>
        <!-- Email -->
        <div class="mb-3">
          <label for="login-email" class="form-label">
            <i class="bi bi-envelope me-1"></i>E-mail
          </label>
          <input
            type="email"
            class="form-control"
            id="login-email"
            placeholder="seu@email.com"
            required
            autocomplete="email"
          >
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label for="login-password" class="form-label">
            <i class="bi bi-lock me-1"></i>Senha
          </label>
          <div class="position-relative">
            <input
              type="password"
              class="form-control"
              id="login-password"
              placeholder="Sua senha"
              required
              autocomplete="current-password"
            >
            <button
              type="button"
              class="btn btn-sm position-absolute top-50 end-0 translate-middle-y me-2 p-0 border-0 bg-transparent"
              id="toggle-password"
              aria-label="Mostrar/ocultar senha"
              style="color: var(--reuso-text-muted);"
            >
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary w-100 btn-lg" id="login-submit-btn">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
        </button>
      </form>

      <!-- Register Link -->
      <div class="text-center mt-4">
        <span class="text-muted">Não tem conta?</span>
        <a href="cadastro.html" class="fw-semibold ms-1">Cadastre-se</a>
      </div>

      <!-- Demo credentials hint -->
      <div class="text-center mt-3 p-3 rounded-3" style="background-color: var(--reuso-bg-alt); font-size: 0.85rem;">
        <i class="bi bi-info-circle me-1 text-reuso-primary"></i>
        <strong>Demo:</strong> Use <code>marcos@email.com</code> / <code>senha123</code>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- App JS -->
  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>

  <script src="js/pages/login.js"></script>

</body>
</html>
