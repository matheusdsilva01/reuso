<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Reuso</title>
  <meta name="description" content="Gerencie seus itens, propostas e perfil no Reuso.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <main>
    <div class="container" style="padding-top: 2rem; padding-bottom: 3rem;">
      <div id="alert-area"></div>

      <!-- Dashboard Header -->
      <div class="dashboard-header" id="dashboard-header"></div>

      <!-- Stats -->
      <div class="dashboard-stats" id="dashboard-stats"></div>

      <!-- Tabs -->
      <ul class="nav nav-tabs mb-4" id="dashboardTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="tab-items" data-bs-toggle="tab" data-bs-target="#my-items" type="button" role="tab">
            <i class="bi bi-box-seam me-1"></i> Meus Itens
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="tab-bids" data-bs-toggle="tab" data-bs-target="#my-bids" type="button" role="tab">
            <i class="bi bi-tag me-1"></i> Meus Lances
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="tab-profile" data-bs-toggle="tab" data-bs-target="#my-profile" type="button" role="tab">
            <i class="bi bi-person me-1"></i> Meu Perfil
          </button>
        </li>
      </ul>

      <div class="tab-content" id="dashboardTabContent">
        <div class="tab-pane fade show active" id="my-items" role="tabpanel"></div>
        <div class="tab-pane fade" id="my-bids" role="tabpanel"></div>
        <div class="tab-pane fade" id="my-profile" role="tabpanel"></div>
      </div>
    </div>
  </main>

  <!-- Confirm Modal -->
  <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="confirmModalTitle">Confirmar</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="confirmModalBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Não</button>
          <button type="button" class="btn btn-primary btn-sm" id="confirmModalBtn">Sim</button>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/items.js"></script>
  <script src="js/bids.js"></script>
  <script src="js/ui.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/pages/dashboard.js"></script>
</body>
</html>
