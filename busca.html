<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar Itens — Reuso</title>
  <meta name="description" content="Encontre itens disponíveis para reutilização. Filtre por categoria, localização e muito mais.">
  <meta name="keywords" content="buscar, itens, reutilizar, reciclagem, materiais, marketplace">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <div id="navbar-container"></div>

  <main>
    <div class="container section-padding">
      <h2 class="mb-4" id="search-page-title">
        <i class="bi bi-search me-2 text-reuso-primary"></i>Buscar Itens
      </h2>

      <!-- ====== FILTER BAR ====== -->
      <div class="card mb-4" id="filter-bar">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <!-- Text Search -->
            <div class="col-12 col-md-6 col-lg-3">
              <label for="search-text" class="form-label">Buscar por texto</label>
              <input type="text" class="form-control" id="search-text" placeholder="Ex: sofá, madeira, telha..." autocomplete="off">
            </div>
            <!-- Category -->
            <div class="col-6 col-md-3 col-lg-2">
              <label for="filter-category" class="form-label">Categoria</label>
              <select class="form-select" id="filter-category">
                <option value="">Todas</option>
              </select>
            </div>
            <!-- State -->
            <div class="col-6 col-md-3 col-lg-2">
              <label for="filter-state" class="form-label">Estado</label>
              <select class="form-select" id="filter-state">
                <option value="">Todos</option>
              </select>
            </div>
            <!-- City -->
            <div class="col-6 col-md-3 col-lg-2">
              <label for="filter-city" class="form-label">Cidade</label>
              <select class="form-select" id="filter-city" disabled>
                <option value="">Todas</option>
              </select>
            </div>
            <!-- Buttons -->
            <div class="col-6 col-md-3 col-lg-3">
              <div class="d-flex gap-2">
                <button class="btn btn-primary flex-grow-1" id="btn-buscar" type="button">
                  <i class="bi bi-search me-1"></i>Buscar
                </button>
                <button class="btn btn-outline-secondary" id="btn-limpar" type="button">
                  <i class="bi bi-x-lg"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ====== RESULTS ====== -->
      <p id="results-count" class="text-muted mb-3"></p>
      <div id="results-grid"></div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer-container"></div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/search.js"></script>
  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/pages/busca.js"></script>
</body>
</html>
