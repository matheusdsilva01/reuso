<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastre-se — Reuso</title>
  <meta name="description" content="Crie sua conta no Reuso e comece a dar um novo destino para itens que você não usa mais.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <main>
    <div class="container">
      <div class="auth-container" style="max-width: 560px;">
        <div class="auth-card">
          <div class="auth-logo"><i class="bi bi-recycle"></i></div>
          <h2 class="auth-title">Criar Conta no Reuso</h2>
          <p class="auth-subtitle">Cadastre-se para publicar e negociar itens</p>

          <div id="alert-area"></div>

          <!-- Account Type Toggle -->
          <div class="auth-toggle" id="account-type-toggle">
            <button type="button" class="btn active" data-type="pf" id="btn-pf">
              <i class="bi bi-person me-1"></i> Pessoa Física
            </button>
            <button type="button" class="btn" data-type="pj" id="btn-pj">
              <i class="bi bi-building me-1"></i> Empresa
            </button>
          </div>

          <form id="register-form" novalidate>
            <!-- Common Fields -->
            <div class="mb-3">
              <label for="reg-name" class="form-label">Nome Completo *</label>
              <input type="text" class="form-control" id="reg-name" placeholder="Seu nome completo" required>
            </div>
            <div class="mb-3">
              <label for="reg-email" class="form-label">E-mail *</label>
              <input type="email" class="form-control" id="reg-email" placeholder="seu@email.com" required>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="reg-password" class="form-label">Senha *</label>
                <input type="password" class="form-control" id="reg-password" placeholder="Mínimo 6 caracteres" required minlength="6">
              </div>
              <div class="col-md-6 mb-3">
                <label for="reg-password-confirm" class="form-label">Confirmar Senha *</label>
                <input type="password" class="form-control" id="reg-password-confirm" placeholder="Repita a senha" required>
              </div>
            </div>
            <div class="mb-3">
              <label for="reg-phone" class="form-label">Telefone *</label>
              <input type="text" class="form-control" id="reg-phone" placeholder="(00) 00000-0000" required>
            </div>

            <!-- PF Fields -->
            <div id="pf-fields">
              <div class="mb-3">
                <label for="reg-cpf" class="form-label">CPF <span class="text-muted">(opcional)</span></label>
                <input type="text" class="form-control" id="reg-cpf" placeholder="000.000.000-00">
              </div>
            </div>

            <!-- PJ Fields (hidden by default) -->
            <div id="pj-fields" style="display: none;">
              <div class="mb-3">
                <label for="reg-cnpj" class="form-label">CNPJ *</label>
                <input type="text" class="form-control" id="reg-cnpj" placeholder="00.000.000/0000-00">
              </div>
              <div class="mb-3">
                <label for="reg-company" class="form-label">Razão Social *</label>
                <input type="text" class="form-control" id="reg-company" placeholder="Nome da empresa">
              </div>
            </div>

            <!-- Address -->
            <hr class="my-3">
            <h6 class="mb-3"><i class="bi bi-geo-alt me-1"></i> Endereço</h6>
            <div class="mb-3">
              <label for="reg-cep" class="form-label">CEP</label>
              <input type="text" class="form-control" id="reg-cep" placeholder="00000-000">
            </div>
            <div class="row">
              <div class="col-md-5 mb-3">
                <label for="reg-state" class="form-label">Estado *</label>
                <select class="form-select" id="reg-state" required>
                  <option value="">Selecione...</option>
                </select>
              </div>
              <div class="col-md-7 mb-3">
                <label for="reg-city" class="form-label">Cidade *</label>
                <select class="form-select" id="reg-city" required>
                  <option value="">Selecione o estado primeiro</option>
                </select>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 mt-2" id="btn-register">
              <i class="bi bi-person-plus me-1"></i> Criar Conta
            </button>
          </form>

          <p class="text-center mt-3 mb-0">
            Já tem conta? <a href="login.html" class="fw-semibold">Faça login</a>
          </p>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/pages/cadastro.js"></script>
</body>
</html>
