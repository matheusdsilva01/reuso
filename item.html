<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhe do Item — Reuso</title>
  <meta name="description" content="Veja os detalhes deste item disponível no Reuso e faça sua proposta.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <main>
    <div class="container section-padding">
      <div id="alert-area"></div>
      <div id="item-detail"></div>
    </div>
  </main>

  <!-- Proposal Modal -->
  <div class="modal fade" id="proposalModal" tabindex="-1" aria-labelledby="proposalModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="proposalModalLabel"><i class="bi bi-chat-dots me-2"></i>Fazer Proposta</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted mb-3">Escolha o tipo de proposta que deseja fazer:</p>

          <div class="d-flex flex-column gap-2 mb-3">
            <div class="proposal-type-option">
              <input type="radio" name="bid-type" id="bid-type-pago" value="pago">
              <label for="bid-type-pago" class="proposal-type-label">
                <div class="proposal-type-icon icon-pago"><i class="bi bi-cash-coin"></i></div>
                <div class="proposal-type-text">
                  <h6>Pago pelo item e retiro</h6>
                  <p>Você paga um valor e retira o item no endereço</p>
                </div>
              </label>
            </div>

            <div class="proposal-type-option">
              <input type="radio" name="bid-type" id="bid-type-gratis" value="gratis">
              <label for="bid-type-gratis" class="proposal-type-label">
                <div class="proposal-type-icon icon-gratis"><i class="bi bi-hand-thumbs-up"></i></div>
                <div class="proposal-type-text">
                  <h6>Retiro gratuitamente</h6>
                  <p>Você retira o item sem custo para nenhuma das partes</p>
                </div>
              </label>
            </div>

            <div class="proposal-type-option">
              <input type="radio" name="bid-type" id="bid-type-cobro" value="cobro">
              <label for="bid-type-cobro" class="proposal-type-label">
                <div class="proposal-type-icon icon-cobro"><i class="bi bi-truck"></i></div>
                <div class="proposal-type-text">
                  <h6>Cobro para retirar</h6>
                  <p>Você cobra um valor para retirar e dar destino ao item</p>
                </div>
              </label>
            </div>
          </div>

          <div id="bid-value-group" style="display: none;">
            <label for="bid-value" class="form-label">Valor (R$) *</label>
            <div class="input-group">
              <span class="input-group-text">R$</span>
              <input type="number" class="form-control" id="bid-value" placeholder="0,00" min="0.01" step="0.01">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btn-submit-bid">
            <i class="bi bi-send me-1"></i> Enviar Proposta
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="js/utils.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/items.js"></script>
  <script src="js/bids.js"></script>
  <script src="js/ui.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/pages/item.js"></script>
</body>
</html>
